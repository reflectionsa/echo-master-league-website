name: Deploy to Cloudflare R2

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          VITE_DISCORD_CLIENT_ID: "1477115120759996667"
          VITE_DISCORD_REDIRECT_URI: "https://pub-e09519a9341b4ca6bd62c5e785f31dd3.r2.dev/"
          VITE_WORKER_URL: ${{ secrets.VITE_WORKER_URL }}

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Deploy to R2
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          RCLONE_CONFIG_R2_ACL: private
          RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
        run: |
          rclone copy ./dist r2:echo-master-league --progress --no-check-dest --ignore-checksum
